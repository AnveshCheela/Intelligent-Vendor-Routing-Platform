services:
  # The Node.js Backend API
  - type: web
    name: vendor-routing-api
    env: node
    plan: free
    buildCommand: npm install && npm run db:generate && npm run db:push
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vendor-routing-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: vendor-routing-cache
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false

  # The Redis Cache
  - type: redis
    name: vendor-routing-cache
    ipAllowList: []
    plan: free

databases:
  # The PostgreSQL Database
  - name: vendor-routing-db
    databaseName: vendor_routing
    user: admin
    plan: free

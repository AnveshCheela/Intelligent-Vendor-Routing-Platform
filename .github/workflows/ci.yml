name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test-backend:
    name: Build and Test Backend
    runs-on: ubuntu-latest

    # Set up services like Redis and PostgreSQL for backend testing
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: vendor_routing
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Backend Dependencies
      run: npm install

    - name: Generate Prisma Client
      run: npx prisma generate

    - name: Run Database Migrations
      env:
        DATABASE_URL: postgresql://postgres:password@localhost:5432/vendor_routing?schema=public
      run: npx prisma db push --accept-data-loss

    - name: Run Backend Tests
      env:
        DATABASE_URL: postgresql://postgres:password@localhost:5432/vendor_routing?schema=public
        REDIS_URL: redis://localhost:6379
        PORT: 3000
      run: npm run test -- --passWithNoTests

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./frontend

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './frontend/package-lock.json'

    - name: Install Frontend Dependencies
      run: npm install

    - name: Build Frontend React App
      run: npm run build

  docker-build-test:
    name: Test Docker Compose Build
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Build Docker Containers
      run: docker compose build
